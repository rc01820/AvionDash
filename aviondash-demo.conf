# AvionDash — Apache Configuration (Side-by-Side Deployment)
#
# Place at: /etc/httpd/conf.d/aviondash-demo.conf
#
# This file adds /aviondash to a server that is already running another site.
# The existing site at /var/www/html/demo is left completely untouched.
# Both sites share the same VirtualHost (port 80/443).
#
#   Existing site:  http://your-server/demo       → /var/www/html/demo/
#   AvionDash:      http://your-server/aviondash   → /var/www/html/aviondash/

# ── Map /aviondash URL path to the application directory ────────────────────
Alias /aviondash /var/www/html/aviondash

<Directory /var/www/html/aviondash>
    Options -Indexes -MultiViews +FollowSymLinks
    AllowOverride All
    Require all granted

    # PHP-FPM via Unix socket
    <FilesMatch \.php$>
        SetHandler "proxy:unix:/run/php-fpm/aviondash.sock|fcgi://localhost"
    </FilesMatch>
</Directory>

# ── Block direct access to sensitive subdirectories ──────────────────────────
<DirectoryMatch "^/var/www/html/aviondash/(includes|storage)">
    Require all denied
</DirectoryMatch>

# ── Response-time log format (required for Datadog APM slow request detection)
# Add the following two lines inside your existing <VirtualHost *:80> block:
#
#   LogFormat "%h %l %u %t \"%r\" %>s %b \"%{Referer}i\" \"%{User-Agent}i\" %D" aviondash_fmt
#   CustomLog /var/log/httpd/aviondash_access.log aviondash_fmt
#
# Or simply let Datadog collect from your existing access log and filter by
# @http.url_details.path:/aviondash/* in your log monitor queries.
