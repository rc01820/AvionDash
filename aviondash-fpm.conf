; AvionDash PHP-FPM Pool Configuration
; Place at: /etc/php-fpm.d/aviondash.conf
; Application deployed at: /var/www/html/aviondash/

[aviondash]

; Run as apache user so file permissions align
user  = apache
group = apache

; Unix socket (faster than TCP for local traffic)
listen       = /run/php-fpm/aviondash.sock
listen.owner = apache
listen.group = apache
listen.mode  = 0660

; Dynamic process management
pm                   = dynamic
pm.max_children      = 20
pm.start_servers     = 4
pm.min_spare_servers = 2
pm.max_spare_servers = 8

; Recycle workers periodically to keep memory_leak_dashboard fault effects visible
pm.max_requests = 500

; PHP settings for this pool
php_admin_value[error_log]          = /var/log/aviondash/php_errors.log
php_admin_flag[log_errors]          = on
php_admin_flag[display_errors]      = off
php_admin_value[memory_limit]       = 256M
php_admin_value[max_execution_time] = 60
php_admin_value[session.save_path]  = /var/lib/php/session/aviondash
php_admin_value[session.name]       = aviondash_session

; Slow log — captures slow_flights_query and slow_page_reports faults (threshold: 2s)
slowlog                  = /var/log/aviondash/php_slow.log
request_slowlog_timeout  = 2s
request_terminate_timeout= 120s

; Application environment variables
env[APP_ENV]  = demo
env[PHP_POOL] = aviondash
